action: add_authority
reason: >
  The Bundespolizei (Federal Police) is the federal authority for border
  control / Grenzübertritt (§2 BPolG) — relevant to migration matters
  (entry, Zurückweisung, Grenzübertrittsbescheinigung) that sit alongside
  the BAMF asylum process, and entirely absent from the automated sources.
  Added at the level of the Bundespolizeipräsidium in Potsdam with a
  nationwide land-level competence (one row per Bundesland 01..16). The
  subordinate Bundespolizeidirektionen/-inspektionen are intentionally NOT
  added — their per-region boundaries could not be verified cheaply and
  honesty is preferred over unverified coverage.
source: "https://www.bundespolizei.de/die-bundespolizei/organisation/bundespolizeipraesidium-potsdam"
date: 2026-07-06
expires: 2026-12-31
