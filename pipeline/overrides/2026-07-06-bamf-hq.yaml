action: add_authority
reason: >
  The Bundesamt für Migration und Flüchtlinge (BAMF) is the federal
  authority that DECIDES asylum applications nationwide (§5 AsylG). Its
  processing delay is what triggers the §75 VwGO Untätigkeitsklage, yet the
  automated sources (PVOG/BayernPortal) surface only the local AsylbLG
  benefit offices — the deciding federal body was entirely absent. Added as
  the nationwide rank-0 asylum-decision authority: one land-level competence
  row per Bundesland (01..16), so every Gemeinde resolves to the BAMF for
  kind 'bamf'. Headquarters (Zentrale) in Nürnberg; regional Außenstellen
  are added separately (see the bamf-* branch overrides) and are
  subordinate to this HQ (parent relation noted but not modelled — the
  override mechanism cannot add authority_edge rows).
source: "https://www.bamf.de/DE/Behoerde/Aufbau/Standorte/standorte-node.html"
date: 2026-07-06
expires: 2026-12-31
