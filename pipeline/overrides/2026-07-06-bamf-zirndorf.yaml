  via the Land reception system (EASY/Königsteiner Schlüssel), not by a
  fixed per-Kreis territory, so a Bayern-wide land-level competence (area
  '09') at rank 1 is the honest modelling: subordinate regional office, not
  THE local answer. Parent relation to the Nürnberg HQ noted but not
  modelled (override mechanism cannot add authority_edge rows).
