reason: >
  BAMF Außenstelle München — a regional branch (Außenstelle) of the BAMF
  headquarters in Nürnberg, added for SNTIQ's Bavaria focus. As with all
  Außenstellen, applicants are assigned via the Land reception system rather
  than a fixed per-Kreis territory, so a Bayern-wide land-level competence
  (area '09') at rank 1 models it honestly as a subordinate regional office.
  Parent relation to the Nürnberg HQ noted but not modelled (override
  mechanism cannot add authority_edge rows).
