edges:
  # The CJEU is one Article 13 institution composed of two distinct courts.
  - from: court_of_justice
    to: cjeu
    relation: institutional_part
    note: >
      Einer der beiden Gerichte des Gerichtshofs der Europäischen Union;
      institutionelle Zugehörigkeit, keine Aufsichtskette.
    delta: 0.45
    trust: 0.99
    source_url: https://curia.europa.eu/site/jcms/d2_5390/de/ueber-den-gerichtshof-der-europaeischen-union

  - from: general_court
    to: cjeu
    relation: institutional_part
    note: >
      Einer der beiden Gerichte des Gerichtshofs der Europäischen Union;
      institutionelle Zugehörigkeit, keine Aufsichtskette.
    delta: 0.45
    trust: 0.99
    source_url: https://curia.europa.eu/site/jcms/d2_5390/de/ueber-den-gerichtshof-der-europaeischen-union

  - from: general_court
    to: court_of_justice
    relation: appeal
    note: >
      Rechtsmittel gegen Entscheidungen des Gerichts gehen nur nach Maßgabe
      der Verträge, der Satzung und der Verfahrensordnung an den Gerichtshof;
      grundsätzlich auf Rechtsfragen beschränkt, teils mit Zulassungsverfahren.
    delta: 1.0
    trust: 0.99
    source_url: https://curia.europa.eu/site/jcms/d2_5391/de/ueber-den-gerichtshof

  # Article 17(8) TEU: collective political responsibility, not an
  # administrative parent/supervisor relationship.
  - from: commission
    to: parliament
    relation: political_accountability
    note: >
      Die Kommission ist als Kollegium dem Europäischen Parlament politisch
      verantwortlich (Art. 17 Abs. 8 EUV); keine Verwaltungsaufsicht über
      einzelne Kommissionsdienststellen wird daraus modelliert.
    delta: 0.70
    trust: 0.99
    source_url: https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:12016M017

  # Ordinary legislative procedure: co-legislators, neither is above the other.
  - from: parliament
    to: council
    relation: co_legislation
    note: >
      Parlament und Rat beschließen im ordentlichen Gesetzgebungsverfahren
      gemeinsam; die symmetrische Kante bezeichnet keine Hierarchie.
    delta: 0.0
    trust: 0.98
    source_url: https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:12016E294

  # Democratic-accountability channel under Article 284(3) TFEU. The ECB's
  # treaty independence (Article 130 TFEU) remains intact.
  - from: ecb
    to: parliament
    relation: reporting_accountability
    note: >
      Bericht, Aussprache und Anhörungen nach Art. 284 Abs. 3 AEUV; die
      Unabhängigkeit der EZB nach Art. 130 AEUV bleibt unberührt, daher keine
      Weisungs- oder Aufsichtskante.
    delta: 0.55
    trust: 0.99
    source_url: https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:12016E284

  # The Court of Auditors reports support the discharge procedure; neither
  # recipient is the Court's hierarchical superior.
  - from: eca
    to: parliament
    relation: reporting_accountability
    note: >
      Der Rechnungshof übermittelt Prüfungs- und Jahresberichte, die unter
      anderem der Haushaltsentlastung dienen; keine hierarchische Aufsicht.
    delta: 0.55
    trust: 0.98
    source_url: https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:12016E287

  - from: eca
    to: council
    relation: reporting_accountability
    note: >
      Der Rechnungshof übermittelt Prüfungs- und Jahresberichte an Rat und
      Parlament; die Berichtslinie begründet keine hierarchische Aufsicht.
    delta: 0.55
    trust: 0.98
    source_url: https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:12016E287

  # The Ombudsman is elected by Parliament but performs duties independently.
  - from: ombudsman
    to: parliament
    relation: reporting_accountability
    note: >
      Wahl und jährliche Berichterstattung nach Art. 228 AEUV; die
      Bürgerbeauftragte übt ihr Amt unabhängig aus und unterliegt keiner
      hierarchischen Aufsicht des Parlaments.
    delta: 0.55
    trust: 0.99
    source_url: https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:12016E228

  # The Court of Auditors audits EU revenue/expenditure and financial
  # management. This is a financial-control relationship, not command over
  # the Commission's general administrative work.
  - from: commission
    to: eca
    relation: financial_audit
    note: >
      Prüfung der EU-Rechnungsführung sowie der Recht- und Ordnungsmäßigkeit
      von Einnahmen und Ausgaben nach Art. 287 AEUV; auf Finanzkontrolle
      begrenzt und keine allgemeine Verwaltungsaufsicht.
    delta: 0.75
    trust: 0.99
    source_url: https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:12016E287

  # Ombudsman review concerns maladministration in EU institutions and
  # bodies. It is neither a judicial appeal nor oversight of German offices.
  - from: parliament
    to: ombudsman
    relation: maladministration_review
    note: &ombudsman_note >
      Prüfung möglicher Missstände in der Verwaltungstätigkeit von
      EU-Organen und -Einrichtungen nach Art. 228 AEUV; kein gerichtliches
      Rechtsmittel, keine allgemeine Hierarchie und keine Zuständigkeit für
      deutsche Behörden.
    delta: 0.70
    trust: 0.98
    source_url: &ombudsman_source https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:12016E228

  - from: european_council
    to: ombudsman
    relation: maladministration_review
    note: *ombudsman_note
    delta: 0.70
    trust: 0.98
    source_url: *ombudsman_source

  - from: council
    to: ombudsman
    relation: maladministration_review
    note: *ombudsman_note
    delta: 0.70
    trust: 0.98
    source_url: *ombudsman_source

  - from: commission
    to: ombudsman
    relation: maladministration_review
    note: *ombudsman_note
    delta: 0.70
    trust: 0.98
    source_url: *ombudsman_source

  - from: ecb
    to: ombudsman
    relation: maladministration_review
    note: *ombudsman_note
    delta: 0.70
    trust: 0.98
    source_url: *ombudsman_source

  - from: eca
    to: ombudsman
    relation: maladministration_review
    note: *ombudsman_note
    delta: 0.70
    trust: 0.98
    source_url: *ombudsman_source

  - from: edps
    to: ombudsman
    relation: maladministration_review
    note: *ombudsman_note
    delta: 0.70
    trust: 0.98
    source_url: *ombudsman_source

  - from: cjeu
    to: ombudsman
    relation: maladministration_review
    note: >
      Prüfung möglicher Missstände in der Verwaltungstätigkeit des
      Unionsorgans nach Art. 228 AEUV; die rechtsprechende Tätigkeit der
      Unionsgerichte ist ausgenommen. Kein Rechtsmittel und keine
      Zuständigkeit für deutsche Behörden.
    delta: 0.70
    trust: 0.98
    source_url: *ombudsman_source

  # Judicial review is treaty- and procedure-specific. Pointing to the CJEU
  # institution avoids falsely assigning every action to one of its courts.
  - from: parliament
    to: cjeu
    relation: judicial_review
    note: &judicial_review_note >
      Gerichtliche Kontrolle nur im Rahmen der vertraglich und
      verfahrensrechtlich bestimmten Zuständigkeiten der Unionsgerichte
      (insbesondere Art. 263 AEUV); keine allgemeine Verwaltungsaufsicht.
    delta: 1.0
    trust: 0.99
    source_url: &judicial_review_source https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:12016E263

  - from: european_council
    to: cjeu
    relation: judicial_review
    note: *judicial_review_note
    delta: 1.0
    trust: 0.99
    source_url: *judicial_review_source

  - from: council
    to: cjeu
    relation: judicial_review
    note: *judicial_review_note
    delta: 1.0
    trust: 0.99
    source_url: *judicial_review_source

  - from: commission
    to: cjeu
    relation: judicial_review
    note: *judicial_review_note
    delta: 1.0
    trust: 0.99
    source_url: *judicial_review_source

  - from: ecb
    to: cjeu
    relation: judicial_review
    note: *judicial_review_note
    delta: 1.0
    trust: 0.99
    source_url: *judicial_review_source

  # EDPS supervision is real but strictly sectoral: EU bodies' processing of
  # personal data, not national German authorities. The CJEU judicial-capacity
  # exception is stated explicitly on that edge.
  - from: parliament
    to: edps
    relation: sectoral_oversight
    note: &edps_note >
      Datenschutzaufsicht nur über die Verarbeitung personenbezogener Daten
      durch EU-Organe und -Einrichtungen nach Verordnung (EU) 2018/1725;
      keine Zuständigkeit für deutsche Behörden und keine allgemeine Aufsicht.
    delta: 0.85
    trust: 0.98
    source_url: &edps_source https://www.edps.europa.eu/data-protection/our-role-supervisor_de

  - from: european_council
    to: edps
    relation: sectoral_oversight
    note: *edps_note
    delta: 0.85
    trust: 0.98
    source_url: *edps_source

  - from: council
    to: edps
    relation: sectoral_oversight
    note: *edps_note
    delta: 0.85
    trust: 0.98
    source_url: *edps_source

  - from: commission
    to: edps
    relation: sectoral_oversight
    note: *edps_note
    delta: 0.85
    trust: 0.98
    source_url: *edps_source

  - from: ecb
    to: edps
    relation: sectoral_oversight
    note: *edps_note
    delta: 0.85
    trust: 0.98
    source_url: *edps_source

  - from: eca
    to: edps
    relation: sectoral_oversight
    note: *edps_note
    delta: 0.85
    trust: 0.98
    source_url: *edps_source

  - from: ombudsman
    to: edps
    relation: sectoral_oversight
    note: *edps_note
    delta: 0.85
    trust: 0.98
    source_url: *edps_source

  - from: cjeu
    to: edps
    relation: sectoral_oversight
    note: >
      Datenschutzaufsicht über die Verarbeitung personenbezogener Daten durch
      das Unionsorgan nach Verordnung (EU) 2018/1725, jedoch nicht über die
      Verarbeitung durch die Unionsgerichte in ihrer justiziellen Tätigkeit;
      keine Zuständigkeit für deutsche Behörden.
    delta: 0.85
    trust: 0.98
    source_url: https://eur-lex.europa.eu/legal-content/DE/TXT/?uri=CELEX:32018R1725
