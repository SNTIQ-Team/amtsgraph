meta:
  verified_at: "2026-07-15"
  scope: >
    Curated institutional map of the seven institutions named in Article 13
    TEU, the two courts which form the CJEU, and two independent EU bodies.
    It deliberately creates no edge to a German authority: EU competences,
    judicial remedies and national implementation are procedure-specific and
    must not be presented as a blanket supervisory hierarchy. CJEU rulings
    may bind a national court or Member State in treaty-defined procedures,
    but a preliminary ruling is judicial cooperation rather than an appeal
    from the national judgment; that class-level procedure is documented
    instead of being guessed as thousands of authority-to-authority edges.
  legal_basis: https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:12016M013
  procedural_basis: https://eur-lex.europa.eu/eli/treaty/tfeu_2012/art_267/oj/deu

