proxy_cache_path /var/cache/nginx/sntiq levels=1:2 keys_zone=sntiq_cache:4m max_size=64m inactive=2h use_temp_path=off;

# The upstream CORS middleware reflects only the explicitly allowed browser
# origins. Keep those responses in separate cache buckets: the default nginx
# cache key ignores Origin, so a no-Origin curl/monitor request could otherwise
# poison the browser cache with a perfectly valid 200 response that lacks
# Access-Control-Allow-Origin.
map $http_origin $sntiq_origin_cache_bucket {
    default                    other;
    ""                         none;
    "https://sntiq.com"        site;
    "https://www.sntiq.com"    site-www;
    "http://localhost:3000"    local;
    "http://127.0.0.1:3000"    local-ip;
}
# api.sntiq.com — SNTIQ Platform API (uvicorn on 127.0.0.1:8001)
# fax.sntiq.com — static stub

limit_req_zone $binary_remote_addr zone=sntiq_api:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;
    server_name api.sntiq.com fax.sntiq.com;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.sntiq.com;
    ssl_certificate /etc/letsencrypt/live/api.sntiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.sntiq.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # CrowdSec ban list applies in front; this is the burst brake
    location = /lex { return 301 /lex/; }
    location /lex/ {
        limit_req zone=sntiq_api burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8002/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_cache sntiq_cache;
        proxy_cache_key "$scheme|$request_method|$host|$request_uri|$sntiq_origin_cache_bucket";
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        client_max_body_size 64k;
    }
    location / {
        limit_req zone=sntiq_api burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_cache sntiq_cache;
        proxy_cache_key "$scheme|$request_method|$host|$request_uri|$sntiq_origin_cache_bucket";
        proxy_cache_use_stale error timeout updating;
        proxy_cache_lock on;
        client_max_body_size 64k;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name fax.sntiq.com;
    ssl_certificate /etc/letsencrypt/live/fax.sntiq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fax.sntiq.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/stubs/fax;
    location / { try_files $uri /index.html; }
}
